name: MoonRedactKit CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  moonbit:
    name: moonbit-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install MoonBit on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Post install
        run: |
          moon version --all
          moon update

      - name: Moon check without warnings
        run: moon check --deny-warn --target all

      - name: Moon test without warnings
        run: moon test --deny-warn --target all

      - name: Format check
        run: moon fmt --check

      - name: API metadata check
        run: |
          moon info
          git diff --exit-code -- '*.mbti'

      - name: Run CLI demo
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: moon run cmd/main

